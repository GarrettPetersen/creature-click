<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a3d2e" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <title>Creature Click</title>
    <meta
      name="description"
      content="A gentle camera game for kids—focus, snap, and collect polaroid photos of animals from around the world."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Creature Click" />
    <meta
      property="og:description"
      content="A gentle camera game for kids—focus, snap, and collect polaroid photos of animals from around the world."
    />
    <meta property="og:image" content="https://creature.click/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Three polaroid-style animal photos on a wooden table." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Creature Click" />
    <meta
      name="twitter:description"
      content="A gentle camera game for kids—focus, snap, and collect polaroid photos of animals from around the world."
    />
    <meta name="twitter:image" content="https://creature.click/og-image.png" />
    <link rel="preconnect" href="https://commons.wikimedia.org" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="creature-bg" class="creature-bg" aria-hidden="true">
      <div class="creature-bg__drift" id="creature-drift">
        <img id="creature-img" class="creature-bg__img" alt="" width="800" height="600" decoding="async" />
      </div>
      <div class="creature-bg__vignette" aria-hidden="true"></div>
    </div>

    <div id="shutter-flash" class="shutter-flash" aria-hidden="true"></div>

    <div class="camera-reticle" aria-hidden="true">
      <svg class="camera-reticle__svg" viewBox="0 0 100 100" role="presentation" focusable="false">
        <path class="camera-reticle__fill" d="M 10 50 A 40 40 0 0 1 90 50 Z" />
        <circle class="camera-reticle__ring" cx="50" cy="50" r="40" fill="none" />
      </svg>
    </div>

    <div
      id="camera-hit"
      class="camera-hit"
      tabindex="0"
      role="button"
      aria-label="Camera"
    ></div>

    <div id="album-modal" class="album-modal hidden" role="dialog" aria-modal="false" aria-hidden="true">
      <div id="album-scroll" class="album-modal__inner">
        <header class="album-modal__hero">
          <div class="donut-block">
            <svg class="donut-svg" viewBox="0 0 100 100" aria-hidden="true">
              <circle class="donut-svg__track" cx="50" cy="50" r="40" fill="none" stroke-width="7" />
              <circle
                id="donut-progress"
                class="donut-svg__progress"
                cx="50"
                cy="50"
                r="40"
                fill="none"
                stroke-width="7"
                stroke-linecap="round"
                transform="rotate(-90 50 50)"
              />
            </svg>
            <div id="modal-countdown" class="donut-block__time" role="timer" aria-live="polite"></div>
          </div>
        </header>
        <div id="album-list" class="album-list"></div>
      </div>
    </div>

    <div id="print-stage" class="print-stage hidden" aria-hidden="true">
      <div class="polaroid polaroid--print polaroid--emerging" id="emerging-polaroid">
        <div class="polaroid__photo">
          <img id="print-img" class="polaroid__img" alt="" width="800" height="600" decoding="async" />
        </div>
        <p class="polaroid__caption" id="print-caption"></p>
      </div>
    </div>

    <div id="expand-layer" class="expand-layer hidden" aria-hidden="true">
      <button type="button" class="expand-layer__backdrop" id="expand-backdrop" aria-label="Close"></button>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
