<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a3d2e" />
    <title></title>
    <link rel="preconnect" href="https://commons.wikimedia.org" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="countdown-bar" class="countdown-bar hidden" role="timer" aria-live="polite" aria-atomic="true">
      <span id="countdown-clock" class="countdown-bar__clock"></span>
    </div>

    <div class="app">
      <main class="main">
        <section class="stage" aria-label="Game">
          <div id="play-panel" class="panel play-panel">
            <div
              class="viewfinder"
              id="viewfinder"
              tabindex="0"
              role="button"
              aria-label="Camera"
            >
              <div class="creature-stack">
                <div class="creature-drift" id="creature-drift" aria-hidden="true">
                  <img id="creature-img" class="creature-img" alt="" width="800" height="600" decoding="async" />
                </div>
              </div>
              <div class="vignette" aria-hidden="true"></div>
            </div>
            <button type="button" id="new-creature-btn" class="btn-icon hidden" aria-label="Another animal">
              <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6" />
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                <path d="M1 20v-6h6" />
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L1 14" />
              </svg>
            </button>
          </div>
        </section>

        <section class="collection-section">
          <ul id="collection-grid" class="collection-grid" aria-label="Photos"></ul>
        </section>
      </main>
    </div>

    <div id="print-stage" class="print-stage hidden" aria-hidden="true">
      <div class="polaroid polaroid--print polaroid--emerging" id="emerging-polaroid">
        <div class="polaroid__photo">
          <img id="print-img" class="polaroid__img" alt="" width="800" height="600" decoding="async" />
        </div>
        <p class="polaroid__caption" id="print-caption"></p>
      </div>
    </div>

    <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <button type="button" class="lightbox__backdrop" id="lightbox-backdrop" aria-label="Close"></button>
      <div class="polaroid polaroid--large" id="lightbox-card">
        <div class="polaroid__photo">
          <img id="lightbox-img" class="polaroid__img" alt="" decoding="async" />
        </div>
        <p class="polaroid__caption" id="lightbox-caption"></p>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
